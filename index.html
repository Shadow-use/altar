<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вівтар Тіні</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { background: var(--bg); color: var(--gold); font-family: 'serif'; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .timer-container { font-size: 1.5rem; display: none; padding: 20px; border: 1px solid var(--gold); border-radius: 10px; background: #111; }
        .cards-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .card { width: 120px; height: 180px; border: 1px solid var(--gold); border-radius: 8px; background: #1a1a1a; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2rem; transition: 0.3s; }
        .card:active { transform: scale(0.95); box-shadow: 0 0 15px var(--gold); }
        h1 { font-size: 1.8rem; letter-spacing: 3px; margin-bottom: 5px; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        @media (max-width: 480px) { .card { width: 90px; height: 140px; } }
    </style>
</head>
<body>
    <h1>ВІВТАР ТІНІ</h1>
    <p id="status-text">Обери свою долю на сьогодні</p>
    <div id="timer" class="timer-container">До наступного ритуалу:<br><span id="countdown">00:00:00</span></div>
    <div id="altar" class="cards-container">
        <div class="card" onclick="claimArtifact()">?</div>
        <div class="card" onclick="claimArtifact()">?</div>
        <div class="card" onclick="claimArtifact()">?</div>
    </div>

    <script>
        const REPO_USER = "Shadow-use";
        const ASSETS_REPO = "forge-assets";
        const COOLDOWN = 24 * 60 * 60 * 1000;

        function updateUI() {
            const lastClaim = localStorage.getItem('lastClaim');
            const now = Date.now();
            if (lastClaim && (now - lastClaim < COOLDOWN)) {
                document.getElementById('altar').style.display = 'none';
                document.getElementById('timer').style.display = 'block';
                document.getElementById('status-text').innerText = "Тіні відпочивають...";
                startTimer(parseInt(lastClaim) + COOLDOWN);
            }
        }

        function startTimer(targetTime) {
            const timerElement = document.getElementById('countdown');
            setInterval(() => {
                const diff = targetTime - Date.now();
                if (diff <= 0) location.reload();
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                timerElement.innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function claimArtifact() {
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('user');
            if (!userId) { alert("Помилка: Відкрий через Око."); return; }

            try {
                // Завантажуємо автоматично згенерований список
                const listRes = await fetch(`https://raw.githubusercontent.com/${REPO_USER}/${ASSETS_REPO}/main/artifacts.json`);
                const artifacts = await listRes.json();
                const randomFile = artifacts[Math.floor(Math.random() * artifacts.length)];
                
                const imgUrl = `https://raw.githubusercontent.com/${REPO_USER}/${ASSETS_REPO}/main/${randomFile}`;
                const imgRes = await fetch(imgUrl);
                const buffer = await imgRes.arrayBuffer();
                const secretMark = `\nSHADOW_HEX_START:${userId}:END`;
                const finalBlob = new Blob([buffer, new TextEncoder().encode(secretMark)], {type: 'image/png'});

                const a = document.createElement('a');
                a.href = URL.createObjectURL(finalBlob);
                a.download = randomFile;
                a.click();

                localStorage.setItem('lastClaim', Date.now());
                updateUI();
            } catch (e) { alert("Магія ще готується... (artifacts.json не знайдено)"); }
        }
        updateUI();
    </script>
</body>
</html>
